<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X2Nitter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .page {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    input {
      display: block;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
    }

    input::placeholder { color: #999; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    /* Actions — hidden until valid link */
    .actions {
      display: none;
      margin-top: 12px;
      position: relative;
    }

    .actions.visible { display: flex; }

    .btn-open {
      flex: 1;
      height: 44px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px 0 0 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-open:hover { background: #333; }

    .btn-drop {
      width: 40px;
      height: 44px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-left: 1px solid #555;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-drop:hover { background: #333; }

    .btn-drop span {
      font-size: 10px;
      line-height: 1;
    }

    /* Dropdown */
    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
    }

    .dropdown.open { display: block; }

    .dropdown button {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 14px;
      color: #1a1a1a;
      cursor: pointer;
    }

    .dropdown button:hover { background: #f5f5f5; }
    .dropdown button + button { border-top: 1px solid #eee; }

  </style>
</head>
<body>
  <div class="page">
    <h1>X2Nitter</h1>
    <label for="input" class="sr-only">Twitter or X link</label>
    <input type="url" id="input" placeholder="Paste a twitter.com or x.com link" autocomplete="off" spellcheck="false">

    <div class="actions" id="actions">
      <button class="btn-open" id="btn-open">Open on nitter.net</button>
      <button class="btn-drop" id="btn-drop" aria-label="More instances" aria-expanded="false" aria-controls="dropdown"><span>&#9660;</span></button>
      <div class="dropdown" id="dropdown" role="menu"></div>
    </div>

  </div>

  <div style="position:fixed;bottom:1rem;left:0;right:0;text-align:center;font-size:13px;color:#bbb;">
    <a href="https://github.com/nschumac" style="color:#999;text-decoration:none;">@nschumac</a>
  </div>

  <script>
    const INSTANCES = [
      'nitter.net',
      'xcancel.com',
      'nitter.poast.org',
      'nitter.privacydev.net',
      'nitter.1d4.us',
      'nitter.woodland.cafe',
    ];

    const TWITTER_RE = /^https?:\/\/(www\.|mobile\.)?(twitter\.com|x\.com)\/.+/i;

    const $input   = document.getElementById('input');
    const $actions = document.getElementById('actions');
    const $btnOpen = document.getElementById('btn-open');
    const $btnDrop = document.getElementById('btn-drop');
    const $dropdown = document.getElementById('dropdown');

    // Build dropdown
    INSTANCES.forEach(inst => {
      const btn = document.createElement('button');
      btn.setAttribute('role', 'menuitem');
      btn.textContent = 'Open on ' + inst;
      btn.addEventListener('click', () => {
        closeDropdown();
        openOn(inst);
      });
      $dropdown.appendChild(btn);
    });

    // Show/hide button based on input
    function checkInput() {
      const val = $input.value.trim();
      if (TWITTER_RE.test(val)) {
        $actions.classList.add('visible');
      } else {
        $actions.classList.remove('visible');
        closeDropdown();
      }
    }

    $input.addEventListener('input', checkInput);
    $input.addEventListener('paste', () => setTimeout(checkInput, 0));

    // Open on default instance
    $btnOpen.addEventListener('click', () => openOn(INSTANCES[0]));

    // Enter key
    $input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && $actions.classList.contains('visible')) {
        openOn(INSTANCES[0]);
      }
    });

    // Dropdown toggle
    $btnDrop.addEventListener('click', e => {
      e.stopPropagation();
      const open = $dropdown.classList.toggle('open');
      $btnDrop.setAttribute('aria-expanded', open);
    });

    document.addEventListener('click', closeDropdown);

    function closeDropdown() {
      $dropdown.classList.remove('open');
      $btnDrop.setAttribute('aria-expanded', 'false');
    }

    function openOn(instance) {
      const url = new URL($input.value.trim());
      window.open(`https://${instance}${url.pathname}${url.search}${url.hash}`, '_blank', 'noopener');
    }

    $input.focus();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X2Nitter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff;
      --text: #1a1a1a;
      --placeholder: #999;
      --hover: #333;
      --drop-hover: #f5f5f5;
      --drop-sep: #eee;
      --divider: #555;
      --muted: #999;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --text: #e5e5e5;
        --placeholder: #666;
        --hover: #ccc;
        --drop-hover: #222;
        --drop-sep: #333;
        --divider: #999;
        --muted: #666;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .page {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    input {
      display: block;
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 2px solid var(--text);
      border-radius: 8px;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    input::placeholder { color: var(--placeholder); }

    /* Show actions only when input has a valid URL */
    .actions {
      display: none;
      margin-top: 12px;
      position: relative;
    }

    .page:has(input:valid) .actions { display: flex; }

    .btn-open {
      flex: 1;
      height: 44px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 8px 0 0 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-open:hover { background: var(--hover); }

    /* Dropdown via <details> */
    details {
      position: relative;
    }

    details summary {
      width: 40px;
      height: 44px;
      background: var(--text);
      color: var(--bg);
      border-left: 1px solid var(--divider);
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      list-style: none;
      font-size: 10px;
    }

    details summary::-webkit-details-marker { display: none; }
    details summary:hover { background: var(--hover); }

    details .dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      left: -440px;
      background: var(--bg);
      border: 2px solid var(--text);
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
    }

    details .dropdown button {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
    }

    details .dropdown button:hover { background: var(--drop-hover); }
    details .dropdown button + button { border-top: 1px solid var(--drop-sep); }

    .credit {
      position: fixed;
      bottom: 1rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
    }

    .credit a { color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">
    <h1>X2Nitter</h1>
    <label for="input" class="sr-only">Twitter or X link</label>
    <input type="url" id="input" required
           pattern="https?://(www\.|mobile\.)?(twitter\.com|x\.com)/.+"
           placeholder="Paste a twitter.com or x.com link"
           autocomplete="off" spellcheck="false">

    <div class="actions">
      <button class="btn-open" onclick="openOn('nitter.net')">Open on nitter.net</button>
      <details>
        <summary aria-label="More instances">&#9660;</summary>
        <div class="dropdown">
          <button onclick="openOn('nitter.net')">Open on nitter.net</button>
          <button onclick="openOn('xcancel.com')">Open on xcancel.com</button>
          <button onclick="openOn('nitter.poast.org')">Open on nitter.poast.org</button>
          <button onclick="openOn('nitter.privacydev.net')">Open on nitter.privacydev.net</button>
          <button onclick="openOn('nitter.1d4.us')">Open on nitter.1d4.us</button>
          <button onclick="openOn('nitter.woodland.cafe')">Open on nitter.woodland.cafe</button>
        </div>
      </details>
    </div>
  </div>

  <div class="credit">
    <a href="https://github.com/nschumac">@nschumac</a>
  </div>

  <script>
    function openOn(instance) {
      var url = new URL(document.getElementById('input').value.trim());
      window.open('https://' + instance + url.pathname + url.search + url.hash, '_blank', 'noopener');
    }
  </script>
</body>
</html>
